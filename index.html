<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Username Generator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--tg-theme-text-color, #000000);
        }

        .header p {
            font-size: 15px;
            color: var(--tg-theme-hint-color, #999999);
        }

        .card {
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--tg-theme-text-color, #000000);
        }

        .slider-container {
            position: relative;
            padding: 10px 0;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--tg-theme-hint-color, #e0e0e0);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--tg-theme-button-color, #3390ec);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--tg-theme-button-color, #3390ec);
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .value-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .value-display span {
            font-size: 13px;
            color: var(--tg-theme-hint-color, #999999);
        }

        .value-display .current-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--tg-theme-button-color, #3390ec);
        }

        .total-info {
            text-align: center;
            padding: 16px;
            background: var(--tg-theme-button-color, #3390ec);
            color: white;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .total-info .label {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 4px;
        }

        .total-info .value {
            font-size: 32px;
            font-weight: 700;
        }

        .generate-btn {
            width: 100%;
            padding: 16px;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .generate-btn:active {
            opacity: 0.8;
        }

        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            display: none;
            margin-top: 20px;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-card {
            background: linear-gradient(135deg, var(--tg-theme-button-color, #3390ec) 0%, #2979cc 100%);
            color: white;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }

        .result-card .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .result-card .username {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .result-card .link {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 16px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .action-btn {
            padding: 12px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .action-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--tg-theme-hint-color, #e0e0e0);
            border-top-color: var(--tg-theme-button-color, #3390ec);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 15px;
            color: var(--tg-theme-hint-color, #999999);
        }

        .error {
            background: #ff3b30;
            color: white;
            padding: 16px;
            border-radius: 12px;
            margin-top: 16px;
            text-align: center;
            display: none;
        }

        .error.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .examples {
            margin-top: 20px;
        }

        .examples h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--tg-theme-text-color, #000000);
        }

        .example-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            padding: 8px 16px;
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:active {
            background: var(--tg-theme-button-color, #3390ec);
            color: white;
            border-color: var(--tg-theme-button-color, #3390ec);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Username Generator</h1>
            <p>Генератор из английских слов</p>
        </div>

        <div class="card">
            <div class="input-group">
                <label>Количество слов</label>
                <div class="slider-container">
                    <input type="range" id="letters" min="1" max="3" value="1">
                    <div class="value-display">
                        <span>Минимум: 1</span>
                        <span class="current-value" id="lettersValue">1</span>
                        <span>Максимум: 3</span>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label>Количество цифр</label>
                <div class="slider-container">
                    <input type="range" id="digits" min="0" max="8" value="3">
                    <div class="value-display">
                        <span>Минимум: 0</span>
                        <span class="current-value" id="digitsValue">3</span>
                        <span>Максимум: 8</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="total-info">
            <div class="label">Примеры слов</div>
            <div class="value" style="font-size: 16px;">wood, fire, star, cyber</div>
        </div>

        <button class="generate-btn" id="generateBtn">
            🎲 Сгенерировать Username
        </button>

        <div class="examples">
            <h3>Быстрый выбор:</h3>
            <div class="example-chips">
                <div class="chip" data-letters="1" data-digits="3">1 слово + 3 цифры</div>
                <div class="chip" data-letters="2" data-digits="0">2 слова</div>
                <div class="chip" data-letters="1" data-digits="4">1 слово + 4 цифры</div>
                <div class="chip" data-letters="3" data-digits="0">3 слова</div>
            </div>
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <div class="result-card">
                <div class="icon">✅</div>
                <div class="username" id="username">@example</div>
                <div class="link">Свободный username найден!</div>
                <div class="action-buttons">
                    <button class="action-btn" id="copyBtn">📋 Копировать</button>
                    <button class="action-btn" id="openBtn">🔗 Открыть</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        const lettersSlider = document.getElementById('letters');
        const digitsSlider = document.getElementById('digits');
        const lettersValue = document.getElementById('lettersValue');
        const digitsValue = document.getElementById('digitsValue');
        const generateBtn = document.getElementById('generateBtn');
        const result = document.getElementById('result');
        const error = document.getElementById('error');
        const usernameEl = document.getElementById('username');
        const copyBtn = document.getElementById('copyBtn');
        const openBtn = document.getElementById('openBtn');

        let currentUsername = '';

        function updateTotal() {
            const words = parseInt(lettersSlider.value);
            const digits = parseInt(digitsSlider.value);

            lettersValue.textContent = words;
            digitsValue.textContent = digits;

            generateBtn.disabled = false;
            generateBtn.textContent = '🎲 Сгенерировать Username';
        }

        lettersSlider.addEventListener('input', updateTotal);
        digitsSlider.addEventListener('input', updateTotal);

        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const letters = chip.dataset.letters;
                const digits = chip.dataset.digits;
                lettersSlider.value = letters;
                digitsSlider.value = digits;
                updateTotal();
                tg.HapticFeedback.impactOccurred('light');
            });
        });

        generateBtn.addEventListener('click', () => {
            const words = parseInt(lettersSlider.value);
            const digits = parseInt(digitsSlider.value);

            tg.HapticFeedback.impactOccurred('medium');

            // Отправляем данные боту
            tg.sendData(JSON.stringify({
                words: words,
                digits: digits
            }));

            // Закрываем Web App
            tg.close();
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(currentUsername);
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert('Username скопирован!');
        });

        openBtn.addEventListener('click', () => {
            tg.openTelegramLink(`https://t.me/${currentUsername}`);
        });

        updateTotal();
    </script>
</body>
</html>
